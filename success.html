<!DOCTYPE html>
<html lang="cs" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platba úspěšná — Fachbot</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
  <meta name="theme-color" content="#0f766e" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .success-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .success-card {
      max-width: 480px;
      width: 100%;
      text-align: center;
      padding: 48px 40px;
    }
    .success-icon {
      font-size: 56px;
      margin-bottom: 24px;
    }
    .success-card h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--fg);
    }
    .success-card p {
      color: var(--fg-muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .success-card .primary-btn {
      display: inline-block;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="success-wrap">
    <div class="panel success-card">
      <div class="success-icon">✅</div>
      <h1>Platba proběhla úspěšně</h1>
      <p>Vítej v Fachbot Pro. Neomezená generování, PDF nabídky a vlastní hlavička — vše je teď odemčené.</p>
      <a href="/" class="primary-btn">Zpět na Fachbot</a>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="cs" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Fachbot</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc; --panel: #fff; --fg: #0f172a; --fg-muted: #64748b;
      --border: #e2e8f0; --primary: #0f766e; --primary-light: #f0fdf9;
      --red: #ef4444; --green: #10b981; --yellow: #f59e0b;
      --radius: 12px; --font: 'Inter', sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--fg); min-height: 100vh; }

    /* Login */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; max-width: 360px; width: 100%; text-align: center; }
    .login-card h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
    .login-card p { color: var(--fg-muted); font-size: 14px; margin-bottom: 24px; }
    .login-card input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; font-family: var(--font); margin-bottom: 12px; outline: none; }
    .login-card input:focus { border-color: var(--primary); }
    .login-card button { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font); }
    .login-card button:hover { background: #0d6b63; }
    .login-error { color: var(--red); font-size: 13px; margin-top: 8px; }

    /* Dashboard */
    .dashboard { display: none; }
    .topbar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .topbar-logo { font-weight: 800; font-size: 1.1rem; color: var(--primary); }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .topbar-right span { font-size: 13px; color: var(--fg-muted); }
    .logout-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; font-family: var(--font); color: var(--fg-muted); }
    .logout-btn:hover { border-color: var(--fg-muted); }

    .main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .page-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 24px; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
    .stat-label { font-size: 12px; font-weight: 600; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 800; color: var(--fg); }
    .stat-value.green { color: var(--green); }
    .stat-value.primary { color: var(--primary); }

    /* Grid 2 sloupce */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .panel h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }

    /* Tabulky */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; font-size: 11px; font-weight: 600; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 12px 10px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    /* Badge */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .badge-pro { background: var(--primary-light); color: var(--primary); }
    .badge-free { background: #f1f5f9; color: var(--fg-muted); }
    .badge-active { background: #ecfdf5; color: var(--green); }
    .badge-inactive { background: #fef2f2; color: var(--red); }
    .badge-canceled { background: #fef3c7; color: var(--yellow); }

    /* Bar chart */
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
    .bar-label { width: 180px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--fg); }
    .bar-track { flex: 1; background: var(--bg); border-radius: 99px; height: 8px; }
    .bar-fill { height: 8px; border-radius: 99px; background: var(--primary); }
    .bar-count { width: 30px; text-align: right; color: var(--fg-muted); font-weight: 600; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .tab { padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: none; font-family: var(--font); color: var(--fg-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Loading */
    .loading { text-align: center; padding: 60px; color: var(--fg-muted); }

    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-card">
      <div style="font-size:32px;margin-bottom:16px">🔧</div>
      <h1>Fachbot Admin</h1>
      <p>Přihlášení pro majitele</p>
      <input type="password" id="passwordInput" placeholder="Heslo" autocomplete="current-password" />
      <button id="loginBtn">Přihlásit se</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="topbar">
      <div class="topbar-logo">Fachbot Admin</div>
      <div class="topbar-right">
        <span id="lastRefresh"></span>
        <button class="logout-btn" id="logoutBtn">Odhlásit</button>
      </div>
    </div>

    <div class="main">
      <div class="loading" id="loadingMsg">Načítám data…</div>
      <div id="content" style="display:none">

        <div class="page-title">Přehled</div>

        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Pro uživatelé</div>
            <div class="stat-value primary" id="statPro">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Celkem uživatelů</div>
            <div class="stat-value" id="statUsers">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Generování dnes</div>
            <div class="stat-value green" id="statToday">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Generování celkem</div>
            <div class="stat-value" id="statTotal">—</div>
          </div>
        </div>

        <!-- Grafy -->
        <div class="grid-2">
          <div class="panel">
            <h2>Top profese</h2>
            <div id="tradesChart"></div>
          </div>
          <div class="panel">
            <h2>Top situace</h2>
            <div id="situationsChart"></div>
          </div>
        </div>

        <!-- Tabs: Uživatelé / Generování -->
        <div class="panel">
          <div class="tabs">
            <button class="tab active" data-tab="users">Uživatelé</button>
            <button class="tab" data-tab="gens">Posledních 50 generování</button>
          </div>

          <div class="tab-content active" id="tab-users">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Email</th>
                    <th>Plán</th>
                    <th>Status</th>
                    <th>Jazyk</th>
                    <th>Registrace</th>
                    <th>Konec předpl.</th>
                  </tr>
                </thead>
                <tbody id="usersTable"></tbody>
              </table>
            </div>
          </div>

          <div class="tab-content" id="tab-gens">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Email</th>
                    <th>Profese</th>
                    <th>Situace</th>
                    <th>Kanál</th>
                    <th>Jazyk</th>
                    <th>Čas</th>
                  </tr>
                </thead>
                <tbody id="gensTable"></tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

<script>
let adminPassword = '';

// Login
document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
  const pw = document.getElementById('passwordInput').value.trim();
  if (!pw) return;
  adminPassword = pw;
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginBtn').textContent = 'Přihlašuji…';
  const ok = await loadData();
  if (ok) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    sessionStorage.setItem('fb_admin_pw', pw);
  } else {
    document.getElementById('loginBtn').textContent = 'Přihlásit se';
    document.getElementById('loginError').textContent = 'Nesprávné heslo nebo chyba serveru.';
    adminPassword = '';
  }
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('fb_admin_pw');
  location.reload();
});

// Auto-login ze session
const savedPw = sessionStorage.getItem('fb_admin_pw');
if (savedPw) {
  adminPassword = savedPw;
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadData();
}

async function loadData() {
  try {
    const resp = await fetch('/api/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: adminPassword, action: 'dashboard' }),
    });
    if (!resp.ok) return false;
    const data = await resp.json();
    renderDashboard(data);
    return true;
  } catch {
    return false;
  }
}

function renderDashboard(data) {
  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('lastRefresh').textContent = 'Aktualizováno: ' + new Date().toLocaleTimeString('cs-CZ');

  // Stats
  document.getElementById('statPro').textContent    = data.stats.proUsers;
  document.getElementById('statUsers').textContent  = data.stats.totalUsers;
  document.getElementById('statToday').textContent  = data.stats.todayGenerations;
  document.getElementById('statTotal').textContent  = data.stats.totalGenerations;

  // Charts
  renderBars('tradesChart', data.topTrades);
  renderBars('situationsChart', data.topSituations);

  // Users table
  const maxGen = data.topTrades?.[0]?.[1] || 1;
  const uBody = document.getElementById('usersTable');
  uBody.innerHTML = data.users.map(u => `
    <tr>
      <td>${u.email}</td>
      <td><span class="badge badge-${u.plan}">${u.plan.toUpperCase()}</span></td>
      <td><span class="badge badge-${u.subscription_status}">${u.subscription_status}</span></td>
      <td>${u.lang?.toUpperCase() || '—'}</td>
      <td>${fmt(u.created_at)}</td>
      <td>${u.subscription_end ? fmt(u.subscription_end) : '—'}</td>
    </tr>
  `).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--fg-muted);padding:24px">Zatím žádní uživatelé</td></tr>';

  // Generations table
  const gBody = document.getElementById('gensTable');
  gBody.innerHTML = data.recentGenerations.map(g => `
    <tr>
      <td>${g.email || '—'}</td>
      <td>${g.trade || '—'}</td>
      <td>${g.situation || '—'}</td>
      <td>${g.channel || '—'}</td>
      <td>${g.lang?.toUpperCase() || '—'}</td>
      <td>${fmt(g.created_at)}</td>
    </tr>
  `).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--fg-muted);padding:24px">Zatím žádná generování</td></tr>';
}

function renderBars(containerId, data) {
  const container = document.getElementById(containerId);
  if (!data || data.length === 0) { container.innerHTML = '<p style="color:var(--fg-muted);font-size:13px">Zatím žádná data</p>'; return; }
  const max = data[0][1];
  container.innerHTML = data.map(([label, count]) => `
    <div class="bar-row">
      <div class="bar-label" title="${label}">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/max*100)}%"></div></div>
      <div class="bar-count">${count}</div>
    </div>
  `).join('');
}

function fmt(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('cs-CZ', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});
</script>
</body>
</html>
